# Sekisui Selectors Configuration
# CSS/XPath selectors for parsing Sekisui House Real Estate (sumusite.sekisuihouse.co.jp) property pages

mansion:
  # Basic selectors
  title: "h1"
  price: ".price-value, .property-price, .price, .detail-header__price"
  
  # Navigation XPaths
  property_links_xpath: "//a[contains(@href, '/mansion/detail/')]/@href"
  next_page_xpath: "//a[contains(text(), '次') or contains(@class, 'next')]/@href"
  
  # Table selectors
  table:
    header: "th"
    value: "td"
  
  # Field mappings (label -> model field name)
  field_mappings:
    専有面積: "senyuMensekiStr"
    築年月: "chikunengetsuStr"
    管理費: "kanrihiStr"
    修繕積立金: "syuzenTsumitateStr"
    間取り: "madori"
    バルコニー面積: "balconyMensekiStr"
    管理形態: "kanriKeitai"
    階数: "kaisuStr"
    構造: "kouzou"
    総戸数: "soukosuStr"

