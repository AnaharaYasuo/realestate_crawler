    value: "td"
  field_mappings:
    所在地: address
    価格: priceStr
    間取り: madori
    専有面積: senyuMensekiStr
    築年月: chikunengetsuStr
    所在階: kaisuStr
    建物構造: kouzou
    管理形態: kanriKeitai
    管理費: kanrihiStr
    修繕積立金: syuzenTsumitateStr
    総戸数: soukosuStr
    土地権利: tochikenri
    現況: genkyo
    取引態様: torihiki

