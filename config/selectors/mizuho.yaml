investment:
  # Basic selectors
  title: "h1"
  price: ".price-value, .property-price"
  
  # Navigation XPaths
  property_links_xpath: "//a[contains(@href, '/buyers/property/')]/@href"
  next_page_xpath: "//a[contains(text(), '次の') or contains(@class, 'next')]/@href"
  
  # Table selectors
  table:
    header: "th"
    value: "td"
  
  # Field mappings
  field_mappings:
    利回り: "grossYield"
    表面利回り: "grossYield"
    想定年間収入: "annualRent"
    年間想定収入: "annualRent"
    現況: "currentStatus"
    構造: "kouzou"
    築年月: "chikunengetsuStr"
    土地面積: "tochiMensekiStr"
    建物面積: "tatemonoMensekiStr"
    建ぺい率: "kenpeiStr"
    容積率: "yousekiStr"
    用途地域: "youtoChiiki"
    地目: "chimoku"

