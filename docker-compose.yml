services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: real_estate
      MYSQL_USER: sumifu
      MYSQL_PASSWORD: mayumimayumi0413
    ports:
      - "13306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=100
    restart: always

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=real_estate
      - DB_USER=sumifu
      - DB_PASSWORD=mayumimayumi0413
      - DB_PORT=3306
      - CRAWLER_LIMIT=100
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_BUCKET=realestate-images
    dns:
      - 8.8.8.8
      - 8.8.4.4
      # クラウド環境設定用フラグ（必要な場合）
      # - IS_CLOUD=true
    volumes:
      - ./src:/app/src
      - ./Temp:/app/Temp
      - ./config:/app/config
      - ./docs:/app/docs
    depends_on:
      - db
      - minio
    restart: always

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=real_estate
      - DB_USER=sumifu
      - DB_PASSWORD=mayumimayumi0413
      - DB_PORT=3306
      - CRAWLER_LIMIT=${CRAWLER_LIMIT:-100}
      - CRAWL_COOLDOWN_SEC=${CRAWL_COOLDOWN_SEC:-180}
      - CRAWL_TIMEOUT_SEC=${CRAWL_TIMEOUT_SEC:-1800}
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_BUCKET=realestate-images
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./src:/app/src
      - ./Temp:/app/Temp
      - ./config:/app/config
      - ./docs:/app/docs
      - ./logs:/app/logs
    depends_on:
      - db
      - app
      - minio
    entrypoint: ["sh", "-c", "echo '0 2 * * * cd /app && python src/crawler/scripts/run_pipeline.py >> /app/logs/pipeline.log 2>&1' | crontab - && crond -f"]
    restart: always

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

volumes:
  db_data:
  minio_data:
