type_checking_mode = "off"
disable_type_errors = true
project_includes = ["src/crawler/**/*.py"]
project_excludes = ["**/__pyrefly_virtual__/**", "C:/__pyrefly_virtual__/**", "c:/__pyrefly_virtual__/**", "C:\\__pyrefly_virtual__\\**", "c:\\__pyrefly_virtual__\\**", "**/inmemory/**", "*inmemory*", "**\\inmemory\\**"]
search_paths = ["src/crawler"]
disable_search_path_heuristics = true

[errors]
missing-import = "ignore"
bad-override = "ignore"




