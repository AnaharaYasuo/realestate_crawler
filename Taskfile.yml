version: '3'

tasks:
  default:
    desc: Start the application in detached mode
    cmds:
      - docker compose up -d

  stop:
    desc: Stop the application
    cmds:
      - docker compose down

  init:
    desc: Build and start the application with DB setup
    cmds:
      - docker compose up -d --build
      - docker compose exec -T app python src/crawler/db_setup.py

  logs:
    desc: Tail the application logs
    cmds:
      - docker compose logs -f

  flask-start:
    desc: Start the application (Docker - app service)
    cmds:
      - docker compose up -d app

  flask-stop:
    desc: Stop the application (Docker - app service)
    cmds:
      - docker compose stop app

  crawl:
    desc: 'Start a crawler. Usage: task crawl COMPANY=mitsui TYPE=mansion'
    cmds:
      - curl "http://127.0.0.1:8000/api/{{.COMPANY}}/{{.TYPE}}/start"

  test:
    desc: Run all tests in the test suite
    cmds:
      - docker compose exec -T app pytest src/crawler/tests

  test-slack:
    desc: Run Slack utility unit tests
    cmds:
      - docker compose exec -T app pytest src/crawler/tests/unit/test_slack.py -v

  test-slack-dispatch:
    desc: Send a live Slack message to verify real-time notification dispatch
    cmds:
      - docker compose exec -T app python Temp/test_slack_dispatch.py

  snyk:
    desc: Run Snyk security scan (dependencies) locally using Docker
    cmds:
      - docker run --rm --env-file .env -v .:/app -w /app snyk/snyk:python-3.11 snyk test --file=src/crawler/requirements.txt --skip-unresolved

  snyk-code:
    desc: Run Snyk Code (SAST) scan locally using Docker
    cmds:
      - docker run --rm --env-file .env -v .:/app -w /app snyk/snyk:python-3.11 snyk code test



  snyk-container:
    desc: Run Snyk container scan locally using Docker
    cmds:
      - docker build -t realestate-crawler:test .
      - docker run --rm --env-file .env -v /var/run/docker.sock:/var/run/docker.sock -v .:/app -w /app snyk/snyk:docker snyk container test realestate-crawler:test --file=Dockerfile --severity-threshold=high

  sonar:
    desc: Run SonarCloud scan locally using Docker
    cmds:
      - docker run --rm --env-file .env -v .:/usr/src sonarsource/sonar-scanner-cli

